<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova D1 teaser — banner</title>
<link rel="stylesheet" href="banner.css">
</head>
<body>
<div class="poster">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="orbit"></div>
    <div class="frame"></div>

    <div class="ghost" style="top: 470px; font-size: 460px; -webkit-text-stroke: 2px rgba(56,189,248,0.14);">2027</div>

    <div class="content">
        <div class="kicker"><span class="dot"></span>Coming soon</div>

        <div class="subject">
            <img src="assets/nova-d1-device.svg" alt="Nova D1" style="height: 700px; filter: drop-shadow(0 30px 80px rgba(0,0,0,0.6)) drop-shadow(0 0 90px rgba(56,189,248,0.35));">
        </div>

        <div class="bottom" style="text-align:center;">
            <div class="kicker" style="justify-content:center; color:var(--cyan); letter-spacing:8px; margin-bottom:18px;">The Nova D1</div>
            <h1 class="headline grad" style="font-size: 132px;">Arrives Q1&nbsp;2027</h1>
            <p class="lead" style="font-size: 34px; margin: 26px auto 46px;">A multi-tool you build yourself. Powered by RPCortex.</p>
            <div class="brandbar" style="justify-content:center; gap:28px;">
                <div class="brandmark"><img src="../logo.svg" alt="">NovaLabs</div>
                <div class="handle"><span class="at">@novalabs_ig</span></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
