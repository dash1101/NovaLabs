<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome — banner</title>
<link rel="stylesheet" href="banner.css">
</head>
<body>
<div class="poster">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="orbit"></div>
    <div class="frame"></div>

    <div class="ghost" style="top: 520px; font-size: 188px;">NOVALABS</div>

    <div class="content">
        <div class="kicker"><span class="dot"></span>Welcome aboard</div>

        <div class="subject">
            <img src="assets/nova-n.svg" alt="NovaLabs" style="width: 460px;">
        </div>

        <div class="bottom">
            <h1 class="headline" style="font-size: 96px;">Welcome to<br><span class="grad">NovaLabs</span></h1>
            <p class="lead" style="font-size: 34px; margin: 26px 0 42px; max-width: 820px;">
                An independent hardware &amp; software lab. We build the OS — and the hardware to run it. Follow along for the build.
            </p>
            <div class="spec-strip">
                <div class="spec"><div class="k">Software</div><div class="v sm">RPCortex OS</div></div>
                <div class="spec"><div class="k">Hardware</div><div class="v sm">Nova D1</div></div>
                <div class="spec"><div class="k">Built by</div><div class="v">dash</div></div>
            </div>
            <div class="brandbar" style="margin-top: 44px;">
                <div class="brandmark"><img src="../logo.svg" alt="">NovaLabs</div>
                <div class="handle">novalabs.app&nbsp;&middot;&nbsp;<span class="at">@novalabs_ig</span></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
