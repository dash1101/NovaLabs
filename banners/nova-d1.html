<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova D1 — banner</title>
<link rel="stylesheet" href="banner.css">
</head>
<body>
<div class="poster">
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="orbit"></div>
    <div class="frame"></div>

    <div class="ghost" style="top: 612px; font-size: 250px;">NOVA D1</div>

    <div class="content">
        <div class="kicker"><span class="dot"></span>NovaLabs&nbsp;&middot;&nbsp;Flagship hardware</div>

        <div class="subject">
            <img src="assets/nova-d1-device.svg" alt="Nova D1" style="height: 720px;">
        </div>

        <div class="bottom">
            <h1 class="headline" style="font-size: 118px;">Nova&nbsp;<span class="grad">D1</span></h1>
            <p class="lead" style="font-size: 33px; margin: 20px 0 40px; max-width: 800px;">
                The build-it-yourself multi-tool. A&nbsp;~$40 alternative to the Flipper&nbsp;Zero — off-the-shelf parts, a 3D-printed shell, powered by RPCortex.
            </p>
            <div class="spec-strip">
                <div class="spec"><div class="k">Core</div><div class="v">ESP32-S3</div></div>
                <div class="spec"><div class="k">Build</div><div class="v">~$40</div></div>
                <div class="spec"><div class="k">Runs</div><div class="v sm">RPCortex Vela</div></div>
                <div class="spec"><div class="k">Status</div><div class="v sm">Q1 2027</div></div>
            </div>
            <div class="brandbar" style="margin-top: 44px;">
                <div class="brandmark"><img src="../logo.svg" alt="">NovaLabs</div>
                <div class="handle">novalabs.app&nbsp;&middot;&nbsp;<span class="at">@novalabs_ig</span></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
